name: Hibernate Reactive CI

on:
  workflow_dispatch:
  push:
    branches:
      # Pattern order matters: the last matching inclusion/exclusion wins
      - "main"
      - "[0-9]+.[0-9]+"
      # We don't want to run CI on branches for dependabot, just on the PR.
      - "!dependabot/**"
  pull_request:
    branches:
      - "main"
      - "[0-9]+.[0-9]+"
      # Ignore dependabot PRs that are not just about build dependencies or workflows;
      # we'll reject such PRs and send one ourselves.
      - "!dependabot/**"
      - "dependabot/maven/build-dependencies-**"
      - "dependabot/github_actions/workflow-actions-**"

permissions: {} # none

# See https://github.com/hibernate/hibernate-orm/pull/4615 for a description of the behavior we're getting.
concurrency:
  # Consider that two builds are in the same concurrency group (cannot run concurrently)
  # if they use the same workflow and are about the same branch ("ref") or pull request.
  group: "workflow = ${{ github.workflow }}, ref = ${{ github.event.ref }}, pr = ${{ github.event.pull_request.id }}"
  # Cancel previous builds in the same concurrency group even if they are in progress
  # for pull requests or pushes to forks (not the upstream repository).
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.repository != 'hibernate/hibernate-orm' }}

jobs:
  reactive:
    permissions:
      contents: read
    name: Hibernate Reactive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Reclaim Disk Space
        run: .github/ci-prerequisites.sh
      - name: Set up Java 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Generate cache key
        id: cache-key
        run: |
          CURRENT_BRANCH="${{ github.repository != 'hibernate/hibernate-orm' && 'fork' || github.base_ref || github.ref_name }}"
          CURRENT_MONTH=$(/bin/date -u "+%Y-%m")
          CURRENT_DAY=$(/bin/date -u "+%d")
          ROOT_CACHE_KEY="buildtool-cache"
          echo "buildtool-monthly-cache-key=${ROOT_CACHE_KEY}-${CURRENT_MONTH}" >> $GITHUB_OUTPUT
          echo "buildtool-monthly-branch-cache-key=${ROOT_CACHE_KEY}-${CURRENT_MONTH}-${CURRENT_BRANCH}" >> $GITHUB_OUTPUT
          echo "buildtool-cache-key=${ROOT_CACHE_KEY}-${CURRENT_MONTH}-${CURRENT_BRANCH}-${CURRENT_DAY}" >> $GITHUB_OUTPUT
      - name: Cache Maven/Gradle Dependency/Dist Caches
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        # if it's not a pull request, we restore and save the cache
        if: github.event_name != 'pull_request'
        with:
          path: |
            ~/.m2/repository/
            ~/.m2/wrapper/
            ~/.gradle/caches/
            !~/.gradle/caches/build-cache-*
            ~/.gradle/wrapper/
          key: ${{ steps.cache-key.outputs.buildtool-cache-key }}
          restore-keys: |
            ${{ steps.cache-key.outputs.buildtool-monthly-branch-cache-key }}-
            ${{ steps.cache-key.outputs.buildtool-monthly-cache-key }}-
      - name: Restore Maven/Gradle Dependency/Dist Caches
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        # if it is a pull request, we restore the cache, but we don't save it
        if: github.event_name == 'pull_request'
        with:
          path: |
            ~/.m2/repository/
            ~/.m2/wrapper/
            ~/.gradle/caches/
            !~/.gradle/caches/build-cache-*
            ~/.gradle/wrapper/
          key: ${{ steps.cache-key.outputs.buildtool-cache-key }}
          restore-keys: |
            ${{ steps.cache-key.outputs.buildtool-monthly-branch-cache-key }}-
            ${{ steps.cache-key.outputs.buildtool-monthly-cache-key }}-

      - name: Build Hibernate ORM (without tests)
        run: ./gradlew publishToMavenLocal -x test --no-build-cache --stacktrace
        env:
          DEVELOCITY_ACCESS_KEY: "${{ secrets.DEVELOCITY_ACCESS_KEY }}"

      - name: Determine Hibernate ORM version
        id: orm-version
        run: |
          ORM_VERSION=$(grep hibernateVersion gradle/version.properties | cut -d'=' -f2)
          ORM_MAJOR_MINOR=$(echo "${ORM_VERSION}" | grep -oP '^\d+\.\d+')
          echo "orm-version=${ORM_VERSION}" >> $GITHUB_OUTPUT
          echo "orm-major-minor=${ORM_MAJOR_MINOR}" >> $GITHUB_OUTPUT
          echo "Hibernate ORM version: ${ORM_VERSION} (major.minor: ${ORM_MAJOR_MINOR})"

      - name: Determine Hibernate Reactive branch
        id: reactive-branch
        env:
          GH_TOKEN: ${{ github.token }}
          ORM_MAJOR_MINOR: ${{ steps.orm-version.outputs.orm-major-minor }}
        run: |
          # Fetch all wip/* branches from Hibernate Reactive
          WIP_BRANCHES=$(gh api repos/hibernate/hibernate-reactive/branches --paginate \
            --jq '.[].name' | grep '^wip/' || true)

          SELECTED_BRANCH=""

          # For each wip/* branch, check if its gradle.properties targets our ORM major.minor.
          # wip/* branches are where Hibernate Reactive puts patches for compatibility with
          # the latest ORM snapshot, before the corresponding ORM version is released.
          # They are identified by an uncommented hibernateOrmVersion in their gradle.properties.
          for BRANCH in $WIP_BRANCHES; do
            BRANCH_ORM_VERSION=$(gh api \
              "repos/hibernate/hibernate-reactive/contents/gradle.properties?ref=${BRANCH}" \
              | jq -r '.content' | base64 -d \
              | grep -oP '^hibernateOrmVersion\s*=\s*\K\S+' || true)
            if [ -n "$BRANCH_ORM_VERSION" ]; then
              BRANCH_ORM_MAJOR_MINOR=$(echo "${BRANCH_ORM_VERSION}" | grep -oP '^\d+\.\d+' || true)
              if [ "${BRANCH_ORM_MAJOR_MINOR}" = "${ORM_MAJOR_MINOR}" ]; then
                SELECTED_BRANCH="${BRANCH}"
                echo "Found matching wip branch: ${BRANCH} (targets ORM ${BRANCH_ORM_VERSION})"
                break
              fi
            fi
          done

          if [ -z "$SELECTED_BRANCH" ]; then
            SELECTED_BRANCH="main"
            echo "No matching wip/* branch found, falling back to: main"
          fi

          echo "branch=${SELECTED_BRANCH}" >> $GITHUB_OUTPUT

      - name: Clone Hibernate Reactive (${{ steps.reactive-branch.outputs.branch }})
        run: |
          git clone --depth=1 \
            --branch ${{ steps.reactive-branch.outputs.branch }} \
            https://github.com/hibernate/hibernate-reactive.git \
            hibernate-reactive

      - name: Compile Hibernate Reactive against ORM ${{ steps.orm-version.outputs.orm-version }}
        working-directory: hibernate-reactive
        run: |
          chmod +x gradlew
          # The ORM Gradle plugin is published to Maven Local above, but Gradle's plugin
          # resolution does not search Maven Local by default. This init script injects
          # mavenLocal() into pluginManagement so the SNAPSHOT plugin artifact can be found.
          cat > /tmp/maven-local-plugins.init.gradle <<'EOF'
          beforeSettings { settings ->
            settings.pluginManagement {
              repositories {
                mavenLocal()
                gradlePluginPortal()
              }
            }
          }
          EOF
          ./gradlew classes testClasses \
            -PhibernateOrmVersion=${{ steps.orm-version.outputs.orm-version }} \
            -PhibernateOrmGradlePluginVersion=${{ steps.orm-version.outputs.orm-version }} \
            --init-script /tmp/maven-local-plugins.init.gradle \
            --no-build-cache \
            --no-scan \
            --stacktrace

      - name: Omit produced artifacts from build cache
        run: ./ci/before-cache.sh
